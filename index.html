<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111008">
<meta name="apple-mobile-web-app-title" content="Pancheria">
<link rel="manifest" id="pwa-manifest">
<title>🌭 Panchería</title>
<style>
/* Fuentes inline — sin dependencia externa */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
/* Fallback si no carga Google Fonts */
:root {
  --bg: #111008;
  --s1: #1c1810;
  --s2: #252018;
  --s3: #2f2a1e;
  --acc: #f5a623;
  --acc2: #e85d04;
  --acc3: #ffbe0b;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --text: #f2ede4;
  --muted: #8a7f6e;
  --border: #38321e;
  --glow: rgba(245,166,35,.12);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Nunito','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);}
/* Fallback tipografías si Google Fonts no carga */
.brand-name,.drawer-title,.panel-title,.sheet-title,.mono-val,.tb-total,.total-val,.cobrar-btn,.page-title{
  font-family:'Bebas Neue','Arial Black','Impact',sans-serif;
}
.clock-pill,.mr-val,.ti-sub,.di-sub,.h-total,.pc-price,.reporte-pre{
  font-family:'JetBrains Mono','Courier New',monospace;
}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden;}

/* ── TOP BAR ── */
.topbar{
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top, 0px));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  position:relative;z-index:10;
}
.brand{display:flex;align-items:center;gap:8px;}
.brand-icon{font-size:22px;filter:drop-shadow(0 0 6px var(--acc));}
.brand-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--acc);text-shadow:0 0 14px rgba(245,166,35,.4);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.clock-pill{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc3);}
.menu-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:18px;cursor:pointer;}

/* ── PAGES ── */
.page{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.page.active{display:flex;flex-direction:column;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  background:var(--s1);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:calc(8px + var(--safe-bottom));
  flex-shrink:0;
  position:relative;z-index:10;
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 6px;gap:3px;cursor:pointer;
  transition:.15s;position:relative;
}
.bn-item .bn-icon{font-size:22px;transition:.15s;}
.bn-item .bn-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;transition:.15s;}
.bn-item.active .bn-icon{transform:translateY(-2px);}
.bn-item.active .bn-label{color:var(--acc);}
.bn-item.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--acc);border-radius:2px;}
.bn-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;}

/* ── POS PAGE ── */
.pos-layout{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* ticket mini header */
.ticket-bar{
  background:var(--s2);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;cursor:pointer;
}
.tb-left{display:flex;align-items:center;gap:8px;}
.tb-icon{font-size:20px;}
.tb-count{font-size:12px;font-weight:700;color:var(--muted);}
.tb-total{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--acc);}
.tb-arrow{font-size:14px;color:var(--muted);transition:.2s;}

/* producto grid scroll */
.menu-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.cat-section{margin-bottom:16px;}
.cat-title{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--acc);padding:0 2px 8px;display:flex;align-items:center;gap:6px;}
.cat-title::after{content:'';flex:1;height:1px;background:var(--border);}
.prod-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.prod-card{
  background:var(--s2);border:1.5px solid var(--border);border-radius:14px;
  padding:12px 8px;text-align:center;cursor:pointer;
  transition:all .12s;active:scale(.95);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;overflow:hidden;
  user-select:none;
}
.prod-card:active{transform:scale(.93);background:var(--glow);border-color:var(--acc);}
.prod-card .pc-icon{font-size:24px;line-height:1;}
.prod-card .pc-name{font-size:11px;font-weight:700;line-height:1.2;color:var(--text);}
.prod-card .pc-price{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--acc);}

/* TICKET DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;backdrop-filter:blur(3px);}
.drawer-overlay.open{display:block;}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--s1);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  z-index:51;
  max-height:85dvh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:var(--safe-bottom);
}
.drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px;}
.drawer-header{padding:8px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.drawer-title{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--acc3);letter-spacing:1px;}
.drawer-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}
.drawer-items{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.d-item{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;animation:slideUp .15s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.di-icon{font-size:20px;}
.di-name{flex:1;font-size:13px;font-weight:700;}
.di-ctrl{display:flex;align-items:center;gap:6px;}
.qbtn{width:28px;height:28px;border-radius:8px;background:var(--s3);border:1px solid var(--border);color:var(--text);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--acc);color:#000;border-color:var(--acc);}
.di-qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;min-width:20px;text-align:center;}
.di-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc3);min-width:64px;text-align:right;}
.di-del{background:none;border:none;color:var(--muted);font-size:16px;padding:2px 4px;cursor:pointer;}
.di-del:active{color:var(--red);}
.drawer-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px;}
.drawer-empty span{font-size:36px;display:block;margin-bottom:8px;opacity:.4;}

.drawer-footer{padding:16px;border-top:1px solid var(--border);}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.total-label{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.total-val{font-family:'Bebas Neue',cursive;font-size:42px;color:var(--acc);}
.pago-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pago-opt{
  border:1.5px solid var(--border);background:var(--s2);
  border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;transition:.15s;
}
.pago-opt:active,.pago-opt.active{border-color:var(--acc);background:var(--glow);}
.pago-opt .po-icon{font-size:22px;display:block;}
.pago-opt .po-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:3px;}
.pago-opt.active .po-label{color:var(--acc);}
.cobrar-btn{
  width:100%;padding:18px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;border-radius:16px;
  color:#000;font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;
  cursor:pointer;transition:.15s;
}
.cobrar-btn:active{transform:scale(.97);}
.cobrar-btn:disabled{opacity:.35;cursor:not-allowed;}
.clear-row{display:flex;gap:8px;margin-top:8px;}
.clear-btn{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;font-weight:700;padding:10px;cursor:pointer;}
.clear-btn:active{border-color:var(--acc);color:var(--acc);}

/* ── STATS PAGE ── */
.page-inner{padding:16px;}
.page-title{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--acc3);letter-spacing:1px;margin-bottom:14px;padding-left:2px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;background:var(--sc-color,var(--acc));}
.sc-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.sc-val{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--text);line-height:1.1;margin-top:2px;}
.sc-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-card.full{grid-column:1/-1;}

/* panel */
.panel{background:var(--s2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px;}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ph-title{font-size:14px;font-weight:800;color:var(--text);}
.ph-action{background:var(--acc2);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;}
.ph-action:active{opacity:.8;}

/* table mobile */
.m-list{display:flex;flex-direction:column;}
.m-row{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;}
.m-row:last-child{border-bottom:none;}
.mr-main{flex:1;}
.mr-title{font-size:13px;font-weight:700;}
.mr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.mr-right{text-align:right;}
.mr-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--acc3);}
.mr-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;display:inline-block;margin-top:2px;}
.badge-green{background:rgba(34,197,94,.15);color:var(--green);}
.badge-red{background:rgba(239,68,68,.15);color:var(--red);}
.badge-yellow{background:rgba(255,190,11,.15);color:var(--acc3);}
.badge-blue{background:rgba(96,165,250,.15);color:var(--blue);}

/* stock bar */
.sbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:5px;width:100%;}
.sbar-fill{height:100%;border-radius:3px;}
.sb-ok{background:var(--green);}
.sb-warn{background:var(--acc3);}
.sb-low{background:var(--red);}

/* FORMS */
.form-block{display:flex;flex-direction:column;gap:12px;padding:16px;}
.flabel{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;display:block;}
.finput,.fselect{
  width:100%;background:var(--s2);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 14px;color:var(--text);
  font-size:15px;font-family:'Nunito',sans-serif;
  transition:.15s;
}
.finput:focus,.fselect:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(245,166,35,.1);}
.fselect option{background:var(--s2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-submit{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--acc2),var(--acc));
  border:none;border-radius:14px;
  color:#000;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;
  cursor:pointer;letter-spacing:.5px;
  margin-top:4px;
}
.btn-submit:active{opacity:.85;}
.btn-cancel{width:100%;padding:14px;background:var(--s2);border:1px solid var(--border);border-radius:14px;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-ov.open{display:flex;}
.modal-sheet{
  width:100%;background:var(--s1);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  max-height:90dvh;overflow-y:auto;
  padding-bottom:calc(24px + var(--safe-bottom));
  animation:sheetIn .25s cubic-bezier(.32,.72,0,1);
}
@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--acc);padding:12px 16px 4px;letter-spacing:1px;}

/* TOAST */
.toast-wrap{position:fixed;top:calc(70px + env(safe-area-inset-top,0px));left:12px;right:12px;z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tIn .25s ease;}
.toast.ok{border-left:3px solid var(--green);}
.toast.err{border-left:3px solid var(--red);}
.toast.inf{border-left:3px solid var(--blue);}
@keyframes tIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* IA PAGE */
.ia-msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.ia-msg{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.7;white-space:pre-wrap;}
.ia-msg.user{background:var(--glow);border-color:var(--acc);color:var(--acc3);}
.ia-msg.loading{color:var(--muted);font-style:italic;}
.ia-bar{border-top:1px solid var(--border);padding:10px 12px;padding-bottom:calc(10px + var(--safe-bottom));display:flex;gap:8px;flex-shrink:0;background:var(--s1);}
.ia-input{flex:1;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;}
.ia-input:focus{outline:none;border-color:var(--acc);}
.ia-send{background:var(--acc);border:none;border-radius:12px;padding:0 16px;font-size:20px;cursor:pointer;}
.ia-send:active{opacity:.8;}
.ia-chips{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 0;flex-shrink:0;scrollbar-width:none;}
.ia-chips::-webkit-scrollbar{display:none;}
.ia-chip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0;}
.ia-chip:active{border-color:var(--acc);color:var(--acc);}

/* cierre page */
.cierre-row{display:flex;flex-direction:column;gap:8px;padding:0 16px;}
.cr-item{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;}
.cri-l{display:flex;align-items:center;gap:10px;}
.cri-icon{font-size:24px;}
.cri-label{font-size:13px;font-weight:700;}
.cri-sub{font-size:11px;color:var(--muted);}
.cri-val{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--acc3);}

/* historial item */
.h-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:12px;}
.h-item:last-child{border-bottom:none;}
.h-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);font-weight:700;min-width:40px;}
.h-detail{flex:1;}
.h-prods{font-size:12px;color:var(--muted);margin-top:2px;}
.h-right{text-align:right;}
.h-total{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--acc3);}
.h-hora{font-size:10px;color:var(--muted);margin-top:2px;}
.h-pago{font-size:10px;margin-top:3px;}

/* CONTADOR */
.mono-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.mono-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.mono-title{font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.mono-val{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--text);}
.progress-bar{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;border-radius:4px;transition:width .5s;}
.progress-ok{background:linear-gradient(90deg,var(--green),var(--acc3));}
.progress-warn{background:linear-gradient(90deg,var(--acc3),var(--red));}
.reporte-pre{background:var(--s3);border-radius:12px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.8;color:var(--text);overflow-x:auto;white-space:pre;}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="brand-icon">🌭</span>
      <span class="brand-name">Panchería</span>
    </div>
    <div class="topbar-right">
      <div class="clock-pill" id="clock">--:--</div>
      <button onclick="abrirConfig()" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer">⚙️</button>
    </div>
  </div>

  <!-- ══════════ POS ══════════ -->
  <div class="page active" id="pg-pos">
    <div class="pos-layout">
      <!-- ticket bar tocable -->
      <div class="ticket-bar" onclick="toggleDrawer()">
        <div class="tb-left">
          <span class="tb-icon">🧾</span>
          <span class="tb-count" id="tb-count">0 items</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="tb-total" id="tb-total">$0</span>
          <span class="tb-arrow" id="tb-arrow">▲</span>
        </div>
      </div>
      <!-- menú -->
      <div class="menu-scroll" id="menuScroll"></div>
    </div>
  </div>

  <!-- ══════════ VENTAS ══════════ -->
  <div class="page" id="pg-ventas">
    <div class="page-inner">
      <div class="page-title">📊 Ventas del día</div>
      <div class="stat-grid">
        <div class="stat-card" style="--sc-color:var(--green)">
          <div class="sc-label">Total Hoy</div>
          <div class="sc-val" id="sv-total">$0</div>
          <div class="sc-sub" id="sv-tickets">0 tickets</div>
        </div>
        <div class="stat-card" style="--sc-color:var(--acc3)">
          <div class="sc-label">Promedio</div>
          <div class="sc-val" id="sv-prom">$0</div>
          <div class="sc-sub">por venta</div>
        </div>
        <div class="stat-card" style="--sc-color:var(--blue)">
          <div class="sc-label">Efectivo</div>
          <div class="sc-val" id="sv-efec">$0</div>
        </div>
        <div class="stat-card" style="--sc-color:var(--purple)">
          <div class="sc-label">Digital</div>
          <div class="sc-val" id="sv-dig">$0</div>
